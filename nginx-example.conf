# nginx configuration for Griljor.
# Copy to /etc/nginx/sites-available/griljor and symlink to sites-enabled/.
# Then run: certbot --nginx -d griljor.example.com
# Replace griljor.example.com with your actual domain throughout.

# Map WebSocket path suffix to game server port
map $1 $ws_port {
    battle  3001;
    castle  3002;
    # Add more maps here to match ecosystem.config.js
}

server {
    server_name griljor.example.com;

    # Static frontend (Vite build output)
    location / {
        root /home/ubuntu/griljor/client/dist;
        try_files $uri $uri/ /index.html;
    }

    # Lobby HTTP API
    location /games {
        proxy_pass http://localhost:3000/games;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Lobby WebSocket (live game list updates)
    location /watch {
        proxy_pass http://localhost:3000/watch;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Game server WebSockets — /ws/<mapname> → localhost:<port>
    location ~ ^/ws/(.+)$ {
        proxy_pass http://localhost:$ws_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/griljor.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/griljor.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name griljor.example.com;
    return 301 https://$host$request_uri;
}
