# nginx configuration for Griljor.
# Copy to /etc/nginx/sites-available/griljor and symlink to sites-enabled/.
# Then run: certbot --nginx -d griljor.com

# Map WebSocket path suffix to game server port
map $1 $ws_port {
    battle  3001;
    castle  3002;
    paradise  3003;
    flag  3004;
    hometown  3005;
    sword  3006;
    twoperson  3007;
    trek  3008;
    title  3009;
}

server {
    server_name griljor.com;

    # Static frontend (Vite build output)
    location / {
        root /home/ubuntu/griljor/client/dist;
        try_files $uri $uri/ /index.html;
    }

    # Lobby HTTP API
    location /games {
        proxy_pass http://localhost:3000/games;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Lobby WebSocket (live game list updates)
    location /watch {
        proxy_pass http://localhost:3000/watch;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Game server WebSockets — /ws/<mapname> → localhost:<port>
    location ~ ^/ws/(.+)$ {
        proxy_pass http://localhost:$ws_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    listen 80;
}
