<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Griljor: The War of Griljor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      color: #ccc;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 12px;
    }
    h1 { font-size: 1.4em; color: #aaa; letter-spacing: 2px; }

    /* ── Title ── */
    #title-screen {
      position: fixed; inset: 0; z-index: 10;
      background: #0a0a0a;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    }
    #title-canvas { display: block; width: 100%; height: 100%; position: absolute; inset: 0; }

    /* ── Lobby ── */
    #lobby-screen { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 780px; }
    #lobby-controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center; }
    #avatar-preview {
      width: 32px; height: 32px;
      image-rendering: pixelated;
      border: 1px solid #444;
      background: #111;
      display: block;
    }
    #server-list { width: 100%; border: 1px solid #444; min-height: 60px; }
    .server-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-bottom: 1px solid #333;
    }
    .server-row:last-child { border-bottom: none; }
    .server-header {
      display: flex; align-items: center; gap: 12px;
      padding: 4px 12px; border-bottom: 1px solid #555;
      font-size: 0.75em; color: #666; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .server-map        { width: 160px; flex-shrink: 0; word-break: break-word; }
    .server-avatars    { display: flex; flex-wrap: wrap; gap: 4px; width: 300px; flex-shrink: 0; }
    .server-avatars-hdr{ width: 300px; flex-shrink: 0; }
    .server-players    { color: #888; white-space: nowrap; width: 55px; text-align: center; flex-shrink: 0; }
    .server-count-hdr  { width: 55px; text-align: center; flex-shrink: 0; }
    .server-teams      { color: #888; white-space: nowrap; width: 50px; text-align: center; flex-shrink: 0; }
    .server-teams-hdr  { width: 50px; text-align: center; flex-shrink: 0; }
    .server-rooms      { color: #888; white-space: nowrap; width: 50px; text-align: center; flex-shrink: 0; }
    .server-rooms-hdr  { width: 50px; text-align: center; flex-shrink: 0; }
    .server-join-hdr   { width: 50px; flex-shrink: 0; }
    .join-btn {
      background: #2a2a2a; border: 1px solid #555; color: #bbb;
      padding: 5px 6px 5px 10px; cursor: pointer; font-family: monospace; font-size: 0.9em;
    }
    .join-btn:hover:not(:disabled) { background: #3a3a3a; }
    .join-btn:disabled { opacity: 0.4; cursor: default; }
    #lobby-status { font-size: 0.85em; color: #666; min-height: 1.2em; }
    #lobby-updated { font-size: 0.75em; color: #555; margin-top: 4px; }

    /* ── Game ── */
    #game-screen { display: none; flex-direction: column; align-items: center; gap: 12px; }
    #game-body { display: flex; gap: 16px; align-items: flex-start; }
    #game-left { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    #room-info { font-size: 0.9em; color: #888; min-height: 1.2em; }
    canvas {
      display: block;
      image-rendering: pixelated;
      border: 1px solid #444;
    }
    #nav {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 6px;
      width: 200px;
    }
    #nav button {
      background: #2a2a2a; border: 1px solid #555; color: #bbb;
      padding: 6px 10px; cursor: pointer; font-family: monospace; font-size: 0.85em;
    }
    #nav button:hover:not(:disabled) { background: #3a3a3a; }
    #nav button:disabled { opacity: 0.3; cursor: default; }
    #btn-north { grid-column: 2; grid-row: 1; }
    #btn-west  { grid-column: 1; grid-row: 2; }
    #btn-east  { grid-column: 3; grid-row: 2; }
    #btn-south { grid-column: 2; grid-row: 3; }
    #game-controls { display: flex; gap: 8px; }
    #status { font-size: 0.8em; color: #666; min-height: 1em; }
    #chat-panel {
      width: 640px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #chat-log {
      height: 120px;
      overflow-y: auto;
      background: #111;
      border: 1px solid #444;
      padding: 6px 8px;
      font-size: 0.8em;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-msg { color: #bbb; }
    .chat-msg .chat-name { color: #888; }
    .chat-report { color: #f84; font-style: italic; }
    #chat-input-row { display: flex; gap: 6px; }
    #chat-input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #555;
      color: #ccc;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 0.85em;
    }
    #chat-send {
      background: #2a2a2a; border: 1px solid #555; color: #bbb;
      padding: 5px 10px; cursor: pointer; font-family: monospace; font-size: 0.85em;
    }
    #chat-send:hover { background: #3a3a3a; }

    /* ── Mouse widget ── */
    #mouse-widget { margin-bottom: 10px; }
    #mouse-bitmap-wrap {
      position: relative;
      display: inline-block;
      background: #111;
    }
    #mouse-bitmap { display: block; border: none; }
    #hand-left-canvas, #hand-middle-canvas, #hand-right-canvas {
      position: absolute;
      top: 18px;
    }
    #hand-left-canvas   { left:  8px; }
    #hand-middle-canvas { left: 48px; }
    #hand-right-canvas  { left: 88px; }

    /* ── Player list ── */
    #player-list-panel {
      width: 240px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 29px;
    }
    #player-list-panel h2 {
      font-size: 0.8em;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
      padding-bottom: 4px;
    }
    #player-list { display: flex; flex-direction: column; gap: 6px; }
    .player-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .player-row canvas {
      width: 32px; height: 32px;
      border: 1px solid #333;
      background: #111;
      flex-shrink: 0;
    }
    .player-details { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .player-name { font-size: 0.85em; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-kd   { font-size: 0.75em; color: #666; }
    .player-time { font-size: 0.75em; color: #555; }

    /* ── Stats panel ── */
    #stats-panel {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
      margin-bottom: 4px;
    }
    #stats-panel h2 {
      font-size: 0.8em;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
      padding-bottom: 4px;
    }
    .stat-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75em;
    }
    .stat-label { color: #666; width: 20px; flex-shrink: 0; }
    .stat-bar {
      flex: 1;
      height: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
    }
    .stat-fill { height: 100%; transition: width 0.15s; }
    .hp-fill  { background: #c33; }
    .mp-fill  { background: #33c; }
    .stat-val { color: #555; width: 54px; text-align: right; flex-shrink: 0; }
    #xp-line { font-size: 0.75em; color: #555; }

    /* ── Inventory panel ── */
    #inv-panel {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #inv-panel h2 {
      font-size: 0.8em;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
      padding-bottom: 4px;
    }
    #inv-weight {
      font-size: 0.75em;
      color: #555;
    }
    #inv-grid {
      display: grid;
      grid-template-columns: repeat(7, 34px);
      gap: 1px;
    }
    .inv-cell {
      width: 34px;
      height: 34px;
      background: #111;
      border: 1px solid #2a2a2a;
      position: relative;
      cursor: pointer;
      box-sizing: border-box;
    }
    .inv-cell:hover { border-color: #555; }
    .inv-cell canvas {
      display: block;
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      border: none;
    }
    .inv-cell .inv-count {
      position: absolute;
      bottom: 1px;
      right: 2px;
      font-size: 9px;
      color: #ff0;
      pointer-events: none;
      line-height: 1;
    }

    /* ── Tooltip ── */
    #tooltip {
      display: none;
      position: fixed;
      z-index: 1000;
      background: #1a1a1a;
      border: 1px solid #555;
      padding: 7px 10px;
      font-family: monospace;
      font-size: 0.8em;
      color: #ccc;
      pointer-events: none;
      max-width: 200px;
      line-height: 1.5;
    }
    .tip-name { color: #eee; font-weight: bold; margin-bottom: 3px; }
    .tip-row  { color: #aaa; }
    .tip-lbl  { color: #666; }

    /* shared input style */
    select, input, button.game-btn {
      background: #2a2a2a; border: 1px solid #555; color: #bbb;
      padding: 5px 8px; font-family: monospace; font-size: 0.9em; cursor: pointer;
    }
    input { cursor: text; }
    #player-name { width: 120px; }
    .join-btn, #leave-btn, #mode-toggle {
      background: #2a2a2a; border: 1px solid #555; color: #bbb;
      padding: 5px 10px; cursor: pointer; font-family: monospace; font-size: 0.85em;
    }
    .join-btn:hover:not(:disabled), #leave-btn:hover, #mode-toggle:hover { background: #3a3a3a; }
    .join-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>

  <div id="tooltip"></div>

  <!-- ── Title Screen ── -->
  <div id="title-screen">
    <canvas id="title-canvas"></canvas>
  </div>

  <!-- ── Lobby Screen ── -->
  <div id="lobby-screen" style="display:none">
    <h1>GRILJOR</h1>
    <div id="lobby-controls">
      <canvas id="avatar-preview" width="32" height="32"></canvas>
      <select id="avatar-select"></select>
      <input id="player-name" maxlength="24" placeholder="name" />
    </div>
    <div id="server-list"></div>
    <div id="lobby-updated"></div>
    <div id="lobby-status">Loading…</div>
  </div>

  <!-- ── Game Screen ── -->
  <div id="game-screen">
    <h1>GRILJOR</h1>
    <div id="game-body">
      <div id="game-left">
        <div id="room-info"></div>
        <canvas id="game-canvas" width="704" height="704"></canvas>
        <div id="nav">
          <button id="btn-north" disabled>↑ N</button>
          <button id="btn-west"  disabled>← W</button>
          <button id="btn-east"  disabled>E →</button>
          <button id="btn-south" disabled>↓ S</button>
        </div>
        <div id="game-controls">
          <button id="mode-toggle">☀ Light</button>
          <button id="leave-btn">Leave Game</button>
        </div>
        <div id="status"></div>
        <div id="chat-panel">
          <div id="chat-log"></div>
          <div id="chat-input-row">
            <input id="chat-input" type="text" maxlength="200" placeholder="Say something…" />
            <button id="chat-send">Send</button>
          </div>
        </div>
      </div>
      <div id="player-list-panel">
        <div id="mouse-widget">
          <div id="mouse-bitmap-wrap">
            <canvas id="mouse-bitmap" width="128" height="128"></canvas>
            <canvas id="hand-left-canvas"   width="32" height="32"></canvas>
            <canvas id="hand-middle-canvas" width="32" height="32"></canvas>
            <canvas id="hand-right-canvas"  width="32" height="32"></canvas>
          </div>
        </div>
        <div id="stats-panel">
          <h2>Stats</h2>
          <div class="stat-row">
            <span class="stat-label">HP</span>
            <div class="stat-bar"><div id="hp-bar" class="stat-fill hp-fill" style="width:100%"></div></div>
            <span class="stat-val" id="hp-text">100/100</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">MP</span>
            <div class="stat-bar"><div id="mp-bar" class="stat-fill mp-fill" style="width:100%"></div></div>
            <span class="stat-val" id="mp-text">50/50</span>
          </div>
          <div id="xp-line">Lvl 1 · XP: 0</div>
        </div>
        <div id="inv-panel">
          <h2>Inventory</h2>
          <div id="inv-weight">0 / 150</div>
          <div id="inv-grid"></div>
        </div>
        <h2>Players</h2>
        <div id="player-list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
