# nginx configuration for Griljor.
# Copy to /etc/nginx/sites-available/griljor and symlink to sites-enabled/.
# Then run: certbot --nginx -d griljor.com

# Map WebSocket URI to game server port
map $uri $ws_port {
    ~^/ws/battle        3001;
    ~^/ws/castle        3002;
    ~^/ws/paradise      3003;
    ~^/ws/flag          3004;
    ~^/ws/ring          3005;
    ~^/ws/ivarr         3006;
    ~^/ws/playtesters   3007;
}

server {
    server_name griljor.com;

    # Static frontend (Vite build output)
    location / {
        root /home/ubuntu/griljor/client/dist;
        try_files $uri $uri/ /index.html;
    }

    # Lobby HTTP API
    location /games {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Lobby WebSocket (live game list updates)
    location /watch {
        proxy_pass http://localhost:3000/watch;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Game server WebSockets — /ws/<mapname> → localhost:<port>
    location ~ ^/ws/(.+)$ {
        proxy_pass http://127.0.0.1:$ws_port/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    listen 80;
}
